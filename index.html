function previewCalculation() {
  const form = document.querySelector("#entryForm");
  const output = document.querySelector("#calculationPreview");
  if (!form || !output || !state.selectedReason) return;
  const r = state.selectedReason;
  const value = r.code?.startsWith("IA_HIDDEN_") ? 1 : Number(form.calculation_input?.value || 0);
  if (["MANUAL_CONFIRMED_REWARD", "MANUAL_CONFIRMED_DEDUCTION"].includes(r.code)) {
    const amount = Math.max(0, value);
    form.amount.value = amount;
    output.textContent = `按已核定金额入账：${amount} 元`;
  } else if (r.code?.startsWith("IA_HIDDEN_")) {
    const amount = Number(r.default_amount || 0);
    form.amount.value = amount;
    output.textContent = `按一次获奖暂存：${money(amount)} 元`;
  } else if (Number(r.default_amount) > 0) {
    const amount = Number(r.default_amount) * Math.max(0, value);
    form.amount.value = amount;
    output.textContent = `${r.default_amount} × ${Math.max(0, value)} = ${amount}`;
  } else {
    output.textContent = "请填写已确认金额。";
  }
}

async function saveRecord(event) {
  event.preventDefault();
  const form = new FormData(event.target);
  const payload = Object.fromEntries(form.entries());
  state.manualEmployeeId = payload.employee_id || state.manualEmployeeId;
  const r = state.selectedReason;
  payload.reason_code = r.code;
  payload.occurred_at = payload.occurred_at ? new Date(payload.occurred_at).toISOString().slice(0, 19) : "";
  const inputValue = r.code?.startsWith("IA_HIDDEN_") ? 1 : Math.max(0, Number(payload.calculation_input || 0));
  payload.amount = r.code?.startsWith("IA_HIDDEN_")
    ? Number(r.default_amount || 0)
    : ["MANUAL_CONFIRMED_REWARD", "MANUAL_CONFIRMED_DEDUCTION"].includes(r.code)
      ? inputValue
      : Number(r.default_amount || 0) * inputValue;
  delete payload.calculation_input;
  const msg = document.querySelector("#saveMessage");
  msg.textContent = "";
  msg.className = "";
  try {
    if (!Number(payload.amount || 0)) throw new Error("金额为0，未暂存。请填写有效金额或次数。");
    state.pendingManualEntries.push({
      ...payload,
      pending_id: `manual-${Date.now()}-${Math.random().toString(16).slice(2)}`,
    });
    savePendingManualEntries();
    state.flashMessage = "已暂存；点击右侧“写入台账”后，才会进入员工记录和 Excel。";
    const customerInput = event.target.querySelector("[name='customer_no']");
    const orderInput = event.target.querySelector("[name='order_no']");
    if (customerInput) customerInput.value = "";
    if (orderInput) orderInput.value = "";
    event.target.querySelector("[name='remark']").value = "";
    render();
    setTimeout(() => scheduleEmployeePreview(0), 0);
  } catch (e) {
    msg.textContent = e.message;
    msg.className = "error";
  }
}

async function addCustomEmployee(formId = "", trigger = null) {
  const picker = trigger?.closest?.(".employee-picker");
  const input = picker?.querySelector?.(".employee-new-name");
  const rawNames = input ? input.value : window.prompt("请输入一名或多名新员工姓名，可用逗号、顿号或换行分隔");
  if (!rawNames || !rawNames.trim()) {
    if (input) input.focus();
    return;
  }
  const names = rawNames.split(/[，、,;；\n\r]+/).map(name => name.trim()).filter(Boolean);
  try {
    const result = await api("/api/employees", { method: "POST", body: JSON.stringify({ names }) });
    const returned = [...(result.items || []), ...(result.skipped || [])];
    const known = new Set(state.employees.map(employee => String(employee.id)));
    state.employees.push(...returned.filter(employee => !known.has(String(employee.id))));
    state.employees.sort((a, b) => a.employee_no.localeCompare(b.employee_no));
    const selected = result.items?.[0] || result.skipped?.[0];
    if (input) input.value = "";
    const form = formId ? document.querySelector(`#${formId}`) : null;
    if (form?.id === "employeeCalculationForm") {
      state.employeeCalculationInputs = blankEmployeeCalculationInputs(selected?.id || "");
      state.employeeCalculation = null;
    } else {
      state.manualEmployeeId = selected?.id || "";
    }
    state.flashMessage = result.items?.length ? `已加入 ${result.items.length} 位员工${result.skipped?.length ? `，跳过 ${result.skipped.length} 位同名员工` : ""}` : "名单中员工已存在，未重复新增";
    render();
  } catch (error) {
    alert(error.message);
  }
}

function currentEmployeeManualTotals() {
  const formEmployeeId = document.querySelector("#employeeCalculationForm")?.elements?.employee_id?.value;
  const employeeId = String(state.employeeCalculationInputs?.employee_id || formEmployeeId || "");
  const active = state.records.filter(item =>
    String(item.employee_id || "") === employeeId &&
    !["cancelled", "clawed_back"].includes(item.status) &&
    item.settlement === "manual"
  );
  const staged = (state.pendingManualEntries || [])
    .filter(item => String(item.employee_id || "") === employeeId)
    .map(item => {
      const reason = state.reasons.find(r => r.code === item.reason_code) || {};
      return {
        ...item,
        type: reason.type || "reward",
        amount_type: reason.amount_type || "money",
        payable_amount: Number(item.amount || 0),
      };
    });
  const allManual = [...active, ...staged];
  const isHiddenReference = item => item.reason_code?.startsWith("IA_HIDDEN_");
  const extraReward = active
    .filter(item => item.type === "reward")
    .reduce((sum, item) => sum + Number(item.payable_amount ?? item.amount ?? 0), 0);
  const stagedReward = staged
    .filter(item => item.type === "reward")
    .reduce((sum, item) => sum + Number(item.payable_amount ?? item.amount ?? 0), 0);
  const deduction = active
    .filter(item => item.type === "penalty" && item.amount_type === "money")
    .reduce((sum, item) => sum + Number(item.amount || 0), 0);
  const stagedDeduction = staged
    .filter(item => item.type === "penalty" && item.amount_type === "money")
    .reduce((sum, item) => sum + Number(item.amount || 0), 0);
  const referenceReward = allManual
    .filter(item => isHiddenReference(item) && item.type === "reward")
    .reduce((sum, item) => sum + Number(item.payable_amount ?? item.amount ?? 0), 0);
  const confirmedReward = allManual
    .filter(item => !isHiddenReference(item) && item.type === "reward")
    .reduce((sum, item) => sum + Number(item.payable_amount ?? item.amount ?? 0), 0);
  return {
    extraReward: extraReward + stagedReward,
    deduction: deduction + stagedDeduction,
    referenceReward,
    confirmedReward,
    stagedReward,
    stagedDeduction,
    stagedCount: staged.length,
    netAdjustment: extraReward + stagedReward - deduction - stagedDeduction,
    hasAdjustment: allManual.length > 0,
  };
}

function currentWeekMonday() {
  const date = new Date();
  const day = date.getDay() || 7;
  date.setDate(date.getDate() - day + 1);
  return date.toISOString().slice(0, 10);
}

function employeeRecordPanels(employees, records) {
  const byName = groupBy(records, record => record.employee_name || "未命名员工");
  const items = employees.length
    ? employees
    : Object.keys(byName).map(name => ({ name, reward_money: 0, penalty_money: 0, penalty_customers: 0, count: byName[name].length }));
  if (!items.length) return `<div class="empty-note">暂无员工记录。</div>`;
  const groupedTables = rows => {
    const groups = [
      { title: "营业部投顾", filter: r => recordSourceName(r) === "营业部" && recordBusinessName(r) === "投顾" },
      { title: "营业部T0", filter: r => recordSourceName(r) === "营业部" && recordBusinessName(r) === "T0" },
      { title: "上海分公司投顾", filter: r => recordSourceName(r) === "上海分公司" && recordBusinessName(r) === "投顾" },
      { title: "上海分公司T0", filter: r => recordSourceName(r) === "上海分公司" && recordBusinessName(r) === "T0" },
      { title: "上海分公司投顾参考项", filter: r => recordSourceName(r) === "上海分公司" && recordBusinessName(r) === "投顾参考项" },
      { title: "手工更正", filter: r => recordSourceName(r) === "手工更正" || recordBusinessName(r) === "手工更正" },
    ];
    return `<div class="employee-record-groups">${groups.map(group => {
      const groupRows = rows.filter(group.filter);
      return `
        <details class="employee-record-group">
          <summary><span>${group.title}</span><small>${groupRows.length} 条</small></summary>
          ${recordsTable(groupRows, { showActions: false })}
        </details>
      `;
    }).join("")}</div>`;
  };
  return `<div class="employee-records">${items.map(employee => {
    const rows = byName[employee.name] || [];
    return `
      <details class="employee-record-panel">
        <summary>
          <span class="employee-record-name">${employee.name}</span>
          <span class="employee-record-metrics">奖励 ${money(employee.reward_money)} 元 · 惩罚 ${money(employee.penalty_money)} 元 · 剥离 ${money(employee.penalty_customers)} 户</span>
        </summary>
        ${groupedTables(rows)}
      </details>
    `;
  }).join("")}</div>`;
}

function renderRules() {
  const byCode = Object.fromEntries(state.reasons.map(reason => [reason.code, reason]));
  const usedCodes = new Set();
  const dictionary = ruleDictionaryGroups().map(group => {
    const items = group.codes.map(code => byCode[code]).filter(Boolean);
    items.forEach(item => usedCodes.add(item.code));
    return `
    <details class="rule-dictionary-group">
      <summary><span>${group.title}</span><small>${group.note}</small></summary>
      ${renderRuleDictionaryTable(items)}
    </details>
  `;
  }).join("");
  const otherRules = state.reasons.filter(reason => !usedCodes.has(reason.code));
  const otherDictionary = otherRules.length ? `<details class="rule-dictionary-group"><summary><span>其他启用规则</span><small>保留给历史数据和扩展口径</small></summary>${renderRuleDictionaryTable(otherRules)}</details>` : "";
  return `
    <section class="section">
      <h2>规则与口径说明</h2>
      <p class="hint">先看这几条即可；结构化字典放在后面，主要给财务复核和导出留痕。</p>
      <div class="rule-coverage clean-rules">
        <div><strong>营业部 · 投顾</strong><span>按投顾新增订单核算基础奖和签约得分，不按客户数。每新增订单基础奖50元；创收补充只看“新增客户”的新增订单综合创收，0-500元补50元，超500至1000元补100元，超1000元补150元，原有客户不参与该项补充。签约得分按订单折算：无创收订单1单；只有新增客户的有创收订单按1.5单，原有客户订单即使有创收也只按1单。创收目标4000元，创收未超1万元时创收得分8分封顶，超1万元不封顶。</span></div>
        <div><strong>营业部 · T0</strong><span>只看新增T0有效户。交易量达到200万元（含）或确认有效户，200元/户；未达到时不发营业部T0奖。</span></div>
        <div><strong>营业部 · 剥离</strong><span>投顾阶段总分不足10分时，先取总分整数档与10分比较；每少1档剥离2户。例：9.5分按9分计，剥离2户；8.2分按8分计，剥离4户。</span></div>
        <div><strong>上海分公司 · 投顾</strong><span>7月三块自动核算：订单净增50元/单；新增客户按50/100/150元分层；新增客户创收按50/100/150/200/250元分层。新增客户数激励和创收激励未满一月均先发50%，同一客户上海分公司投顾奖励封顶500元。</span></div>
        <div><strong>上海分公司 · T0</strong><span>新增T0客户有交易量先给基础50元；50-100万补充50元，100-200万补充100元。原有T0客户本月达到200万元（含）或确认有效户时，只计入有效户阶梯，不拿基础50。</span></div>
        <div><strong>上海分公司 · 投顾参考项</strong><span>单周新增订单竞赛、创收破冰前50和优秀联络员等奖励依赖上海分公司排名或正式统计表；本工具提供补录入口，暂存后随“写入台账”进入员工记录和 Excel，并归入上海分公司投顾参考项。</span></div>
      </div>
      <details class="inline-dictionary"><summary>查看结构化规则字典</summary>${dictionary}${otherDictionary}</details>
    </section>
  `;
}

function groupBy(items, fn) {
  return items.reduce((acc, item) => {
    const key = fn(item);
    acc[key] ||= [];
    acc[key].push(item);
    return acc;
  }, {});
}

function recordSourceName(record) {
  if (record.reason_code?.startsWith("IA_HIDDEN_")) return "上海分公司";
  if (record.settlement === "manual") return "手工更正";
  if (record.record_source === "department") return "营业部";
  if (record.record_source === "branch") return "上海分公司";
  return "手工更正";
}

function recordBusinessName(record) {
  if (record.reason_code?.startsWith("IA_HIDDEN_")) return "投顾参考项";
  if (record.settlement === "manual") return "手工更正";
  if (record.reason_code?.startsWith("T0_") || record.category?.includes("T0")) return "T0";
  if (record.reason_code?.startsWith("PENALTY_") || record.amount_type === "customer_count") return "剥离";
  if (record.category?.includes("手工")) return "手工";
  return "投顾";
}

function recordSortKey(record) {
  const sourceRank = recordSourceName(record) === "营业部" ? 1 : recordSourceName(record) === "上海分公司" ? 2 : 3;
  const biz = recordBusinessName(record);
  const bizRank = biz === "投顾" ? 1 : biz === "T0" ? 2 : biz === "剥离" ? 3 : 4;
  const groupRank = record.reason_code === "IA_DEPT_NEW_CUSTOMER_BASE" ? 1
    : ["IA_DEPT_REVENUE_0_500", "IA_DEPT_REVENUE_500_1000", "IA_DEPT_REVENUE_1000_PLUS"].includes(record.reason_code) ? 2
    : record.reason_code === "IA_BRANCH_ORDER_NET_INCREASE" ? 3
    : ["IA_BRANCH_NEW_CUSTOMER_BASE", "IA_BRANCH_COUNT_10_20", "IA_BRANCH_COUNT_20_PLUS", "IA_BRANCH_NEW_CUSTOMER_TIER_1_9", "IA_BRANCH_NEW_CUSTOMER_TIER_10_14", "IA_BRANCH_NEW_CUSTOMER_TIER_15_PLUS"].includes(record.reason_code) ? 4
    : record.reason_code?.startsWith("IA_BRANCH_REVENUE_") ? 5
    : record.reason_code?.startsWith("IA_DEPT_REVENUE_INCREMENT_") ? 6
    : record.reason_code?.startsWith("IA_BRANCH_ICEBREAK_") ? 7
    : record.reason_code?.startsWith("IA_HIDDEN_WEEKLY_") ? 8
    : record.reason_code === "IA_HIDDEN_REVENUE_ICEBREAK_TOP50" ? 9
    : record.reason_code?.startsWith("IA_HIDDEN_LIAISON_") ? 10
    : record.reason_code?.startsWith("T0_") ? 11
    : record.reason_code?.startsWith("PENALTY_") ? 12
    : 10;
  return [sourceRank, bizRank, groupRank, record.reason_name || ""];
}

function sortedRecords(records) {
  return [...(records || [])].sort((a, b) => {
    const ea = a.employee_name || "";
    const eb = b.employee_name || "";
    const byEmployee = ea.localeCompare(eb, "zh-CN");
    if (byEmployee) return byEmployee;
    const ka = recordSortKey(a);
    const kb = recordSortKey(b);
    for (let i = 0; i < ka.length; i++) {
      if (ka[i] < kb[i]) return -1;
      if (ka[i] > kb[i]) return 1;
    }
    return 0;
  });
}

function recordsTable(records, options = {}) {
  const showActions = options.showActions !== false;
  const rows = sortedRecords(records);
  return `
    <div class="table-wrap">
      <table class="records-table">
        <thead><tr><th>员工</th><th>归属</th><th>业务</th><th>金额/数量</th><th>核算过程</th><th>规则</th>${showActions ? "<th>操作</th>" : ""}</tr></thead>
        <tbody>
          ${rows.map(r => `
            <tr>
              <td>${r.employee_name}</td>
              <td>${recordSourceName(r)}</td>
              <td><span class="process-chip">${recordBusinessName(r)}</span></td>
              <td>${money(r.amount)} ${unit(r.amount_type)}</td>
              <td class="calculation-detail">${r.calculation_detail || "历史记录未保留核算过程"}</td>
              <td title="${r.rule_basis}">${r.reason_name}</td>
              ${showActions ? `<td><button class="mini-danger" onclick="deleteRecord(${r.id})">删除</button></td>` : ""}
            </tr>
          `).join("") || `<tr><td colspan="${showActions ? 7 : 6}">暂无记录</td></tr>`}
        </tbody>
      </table>
    </div>
  `;
}

async function downloadFile(event, link, filename) {
  event.preventDefault();
  if (typeof window.exportLedgerWorkbook === "function") {
    const xml = window.exportLedgerWorkbook(state.records || []);
    const blob = new Blob([xml], { type: "application/vnd.ms-excel;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = String(filename || "reward_penalty_records.xlsx").replace(/\.xlsx$/i, ".xls");
    a.click();
    URL.revokeObjectURL(url);
    return false;
  }
  const res = await fetch(link.href);
  if (!res.ok) {
    alert("导出失败");
    return false;
  }
  const blob = await res.blob();
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
  return false;
}

});
